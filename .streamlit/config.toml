# GarudaChip Streamlit configuration.
#
# fileWatcherType = "none" stops Streamlit's source-file watcher from crawling the
# installed packages on every interaction. That crawl introspects `transformers`'
# lazy vision modules, which try to `import torchvision` (which we don't use and don't
# install) and spew long tracebacks to the console. Disabling the watcher silences all
# of that noise.
#
# Trade-off: the app no longer auto-reloads when you edit a source file — just restart
# `./scripts/run.sh` (or hit "Rerun" in the browser) to pick up changes. Set this back
# to "auto" if you want live reload and don't mind the transformers warnings.
[server]
fileWatcherType = "none"
